# roles/base/tasks/main.yml
---
- name: Ensure sudo is available
  apt:
    name: sudo
    state: present

- name: Update and upgrade apt packages
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install essential utilities
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - unzip
      - ufw
      - fail2ban
    state: present

- name: Enable and start fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: Configure UFW — allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW — allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Configure UFW — allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Configure UFW — allow Grafana
  ufw:
    rule: allow
    port: "3000"
    proto: tcp

- name: Configure UFW — allow Prometheus
  ufw:
    rule: allow
    port: "9090"
    proto: tcp

- name: Configure UFW — allow Alertmanager
  ufw:
    rule: allow
    port: "9093"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

