# docker-compose.yml
networks:
  app_network:
    driver: bridge

services:

  blue:
    image: nginx:alpine
    container_name: blue
    volumes:
      - ./app/blue:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    networks:
      - app_network

  green:
    image: nginx:alpine
    container_name: green
    volumes:
      - ./app/green:/usr/share/nginx/html:ro
    ports:
      - "8082:80"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
    ports:
      - "8080:80"
    command:
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - blue
      - green
    networks:
      - app_network

