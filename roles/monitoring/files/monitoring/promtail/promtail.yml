server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: ansible-server
          __path__: /var/log/*.log
  - job_name: journal
    journal:
      labels:
        job: systemd
        host: ansible-server
    relabel_configs:
      - source_labels: [__journal__systemd_unit]
        target_label: unit

