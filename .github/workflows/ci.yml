#.github/workflows/ci.yml
name: Ansible CI

# When to trigger this pipeline
on:
  push:
    branches: [ main ]     # on every push to main
  pull_request:
    branches: [ main ]    # on every PR targeting main    

jobs:
  lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Check out your repo code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2 - Install Python (ansible-lint needs it)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3 — Install ansible-lint
      - name: Install ansible-lint and collections
        run: |
          pip install ansible-lint
          ansible-galaxy collection install ansible.posix
          ansible-galaxy collection install community.general

      # Step 4 — Lint the master playbook + all roles
      - name: Run ansible-lint
        run: |
          ansible-lint setup.yml

      # Step 5 — Validate YAML syntax on all files
      - name: Validate YAML syntax
        run: |
          pip install yamllint
          yamllint -d relaxed .
