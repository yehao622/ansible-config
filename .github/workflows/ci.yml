#.github/workflows/ci.yml
name: Ansible CI

# When to trigger this pipeline
on:
  push:
    branches: [ main ]     # on every push to main
  pull_request:
    branches: [ main ]    # on every PR targeting main

jobs:
  lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Check out your repo code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 - Install Python (ansible-lint needs it)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3 — Install ansible-lint and collections
      - name: Install ansible-lint and collections
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install ansible.posix
          ansible-galaxy collection install community.general

      # Step 4 — Write vault password BEFORE linting (required to decrypt vault files)
      - name: Write vault password file
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass

      # Step 5 — Lint the master playbook + all roles
      - name: Run ansible-lint
        run: ansible-lint setup.yml

      # Step 6 — Validate YAML syntax on all files
      - name: Validate YAML syntax
        run: |
          pip install yamllint
          yamllint -d relaxed .

  molecule:
    name: Molecule Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Molecule and dependencies
        run: |
          pip install ansible molecule molecule-plugins[docker] docker

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install ansible.posix
          ansible-galaxy collection install community.general

      # Write vault password for molecule tests too
      - name: Write vault password file
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass

      - name: Run Molecule tests for base role
        run: |
          cd roles/base
          molecule test
