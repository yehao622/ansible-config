name: IaC Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      vm_ip: ${{ steps.get_ip.outputs.vm_ip }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write GCP Service Account Key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > terraform/terraform-sa-key.json

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/
        run: |
          terraform apply -auto-approve \
            -var="project_id=ansible-linux" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Get VM IP
        id: get_ip
        working-directory: terraform/
        run: |
          IP=$(terraform output -raw vm_public_ip)
          echo "vm_ip=$IP" >> $GITHUB_OUTPUT

  ansible:
    name: Ansible Provision
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for VM SSH to be ready
        run: |
          sleep 30   # give the VM time to boot

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini setup.yml \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
